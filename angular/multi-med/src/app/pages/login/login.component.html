<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <span class="material-icons brand-icon">favorite_border</span>
      <h2>Multi Med</h2>
      <p>Acesso ao Prontuário Inteligente</p>
    </div>

    <form class="login-form" (submit)="doLogin(); $event.preventDefault()">
      <div class="form-group">
        <label for="email">E-mail ou Usuário</label>
        <input type="email" id="email" placeholder="nome@multimed.com" required>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="form-options">
        <label class="remember">
          <input type="checkbox"> Lembrar de mim
        </label>
        <a href="#" class="forgot-pass">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        Entrar no Sistema
      </button>
      
      <div class="divider">
        <span>ou</span>
      </div>

      <button type="button" class="btn btn-outline btn-block btn-google" (click)="doLogin()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo" class="google-icon">
        Continuar com o Google
      </button>
    </form>
  </div>
</div>
